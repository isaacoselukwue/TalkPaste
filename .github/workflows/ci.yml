name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Linux runtime/test system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xdotool xclip libportaudio2 \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest -q --cov=app --cov-report=term-missing

  build-smoke:
    name: packaging smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Linux runtime libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2 libegl1 libgl1 libxkbcommon0 libdbus-1-3
      - name: Install deps + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: pyinstaller --noconfirm --clean packaging/talkpaste-linux.spec
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --noconfirm --clean packaging/talkpaste-windows.spec
      - name: Self-check the frozen bundle (Linux)
        if: runner.os == 'Linux'
        run: |
          ./dist/talkpaste/talkpaste --selfcheck
      - name: Self-check the frozen bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = Start-Process -FilePath dist\talkpaste\talkpaste.exe -ArgumentList '--selfcheck' -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "self-check failed with exit code $($p.ExitCode)" }
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: talkpaste-${{ runner.os }}
          path: dist/talkpaste
          if-no-files-found: error
          retention-days: 7
